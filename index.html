<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to do app</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="top-nav">
            <h1>Menu</h1>
            <button><img src="./images/menu-icon.png" alt="menu icon"></button>
        </div>
        <div class="search-bar">
            <img src="./images/search-icon.png" alt="search icon">
            <input type="text" placeholder="Search">
        </div>
        <div class="task-section">
            <button class="item">
                <img src="./images/double-arrow-icon.png" alt=" " class="icon">
                <span class="title">Upcoming</span>
                <span class="count">0</span>
            </button>
            <button class="item">
                <img src="./images/today-icon.png" alt=" " class="icon">
                <span class="title">Today</span>
                <span class="count">0</span>
            </button>
        </div>
        <div class="list-section">
            <button class="item">
                <span class="icon color-icon"> </span>
                <span class="title">Personal</span>
                <span class="count">0</span>
            </button>
            <button class="item">
                <span class="icon color-icon"> </span>
                <span class="title">Work</span>
                <span class="count">0</span>
            </button>
        </div>
        <div class="tag-section">
            <button class="tag">Tag1</button>
            <button class="tag">Add tag</button>
        </div>
        <button class="settings-button"><img src="./images/gear-icon.png" alt=" "><span>Settings</span></button>
    </nav>

    <main>

    </main>
    <script src="./main.js"></script>
</body>
</html>
