<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to do app</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="top-nav">
            <h1>Menu</h1>
            <button><img src="./images/menu-icon.png" alt="menu icon" class="menu-icon"></button>
        </div>
        <div class="search-bar">
            <img src="./images/search-icon.png" alt=" " class="search-icon">
            <input type="text" placeholder="Search" class="search-field">
        </div>
        <div class="task-section section">
            <h3>TASKS</h3>
            <button class="item btn">
                <img src="./images/double-arrow-icon.png" alt=" " class="icon">
                <span class="title">Upcoming</span>
                <span class="count">0</span>
            </button>
            <button class="item btn">
                <img src="./images/today-icon.png" alt=" " class="icon">
                <span class="title">Today</span>
                <span class="count">0</span>
            </button>
        </div>
        <hr>
        <div class="list-section section">
            <h3>LISTS</h3>
            <button class="item btn">
                <span class="icon color-icon color1"></span>
                <span class="title">Personal</span>
                <span class="count">0</span>
            </button>
            <button class="item btn">
                <span class="icon color-icon color2"></span>
                <span class="title">Work</span>
                <span class="count">0</span>
            </button>
        </div>
        <hr>
        <div class="tag-section">
            <h3>TAGS</h3>
            <button class="tag tag1">Tag1</button>
            <button class="tag">Add tag</button>
        </div>
        <button class="settings-button btn"><img src="./images/gear-icon.png" alt=" " class="icon"><span>Settings</span></button>
    </nav>

    <main>

    </main>
    <script src="./main.js"></script>
</body>
</html>
